name: Build macOS ARM64

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm tauri build --target aarch64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Ad-hoc sign
        run: |
          APP="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Vibe Coding Manager.app"
          codesign --force --deep --sign - "$APP"
          echo "Signed. Verifying..."
          codesign -vvv "$APP" 2>&1 || true

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create DMG
        run: |
          hdiutil create -volname "Vibe Coding Manager" \
            -srcfolder "src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Vibe Coding Manager.app" \
            -ov -format UDZO \
            "VibeCodingManager_${{ steps.version.outputs.VERSION }}_aarch64.dmg"

      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          name: Vibe Coding Manager v${{ steps.version.outputs.VERSION }}
          body: |
            macOS ARM64 (Apple Silicon) 版本

            **首次安装说明：**
            1. 下载 `.dmg` 文件，打开后将应用拖入 Applications
            2. 首次打开会提示"已取消"，前往 **系统设置 → 隐私与安全性**
            3. 滚动到底部，点击 **仍要打开**，输入密码确认即可
          files: |
            VibeCodingManager_${{ steps.version.outputs.VERSION }}_aarch64.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Vibe Coding Manager.app.tar.gz
