<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- 圆角方块背景 -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- 左括号 < -->
  <path d="M148 156 L88 256 L148 356" stroke="white" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- 右括号 > -->
  <path d="M364 156 L424 256 L364 356" stroke="white" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- 闪电 bolt（中间，代表 vibe/能量） -->
  <path d="M280 136 L216 264 L260 264 L232 376 L316 240 L268 240 Z" fill="url(#bolt)" stroke="white" stroke-width="8" stroke-linejoin="round"/>
</svg>
